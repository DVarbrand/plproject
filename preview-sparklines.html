<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sparkline Preview</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; }
  body { font-family: 'Inter', -apple-system, sans-serif; background: #f8fafc; color: #1e293b; margin: 0; padding: 40px; }
  h2 { font-size: 1rem; color: #1e293b; margin: 0 0 16px; }
  .card { background: #fff; border-radius: 10px; border: 1px solid #e2e8f0; overflow: hidden; max-width: 800px; margin: 0 auto; }
  .card-header { padding: 14px 18px 10px; font-size: 0.8rem; font-weight: 600; color: #1e293b; display: flex; align-items: center; gap: 8px; }
  .indicator { width: 3px; height: 16px; border-radius: 2px; background: #3b82f6; }
  table { width: 100%; border-collapse: collapse; }
  th { text-align: left; padding: 8px 16px; font-size: 0.7rem; font-weight: 600; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.5px; background: #f8fafc; }
  td { padding: 10px 16px; font-size: 0.85rem; color: #334155; border-top: 1px solid #f1f5f9; }
  tr:hover td { background: #f8fafc; }
  .rank { display: inline-flex; align-items: center; justify-content: center; width: 24px; height: 24px; border-radius: 6px; font-size: 0.7rem; font-weight: 700; background: #f1f5f9; color: #64748b; }
  .rank-1 { background: #fef3c7; color: #b45309; }
  .rank-2 { background: #f1f5f9; color: #475569; }
  .rank-3 { background: #fce7e7; color: #c0392b; }
  .points { text-align: right; font-weight: 700; color: #3b82f6; font-variant-numeric: tabular-nums; }
  th:first-child, td:first-child { text-align: center; width: 44px; }
  th:last-child, td:last-child { text-align: right; }
  .sparkline-cell { width: 140px; padding: 6px 12px !important; }
  .sparkline-cell canvas { display: block; }
  .note { text-align: center; margin-top: 24px; font-size: 0.8rem; color: #94a3b8; max-width: 800px; margin-left: auto; margin-right: auto; }
</style>
</head>
<body>

<div class="card">
  <div class="card-header"><div class="indicator"></div> League Standings</div>
  <table>
    <thead>
      <tr>
        <th>#</th>
        <th>Manager</th>
        <th>Team Name</th>
        <th style="width:140px">Trend</th>
        <th style="text-align:right">Points</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<p class="note">
  Each sparkline shows the manager's cumulative points across all gameweeks.<br>
  No overlapping lines — every manager's trajectory is individually readable at a glance.
</p>

<script>
// Fake data: 5 managers with 25 GWs of cumulative points
var managers = [
  { name: 'John Smith', team: "Smith's Strikers", points: 1847, trend: [42,98,140,195,248,302,360,415,480,540,610,670,745,810,880,950,1020,1095,1170,1250,1340,1430,1530,1640,1847] },
  { name: 'Emma Wilson', team: "Wilson's Wonders", points: 1802, trend: [55,105,155,200,260,310,370,420,470,530,600,665,730,790,860,925,990,1060,1140,1220,1310,1400,1500,1650,1802] },
  { name: 'David Chen', team: 'Chen FC', points: 1756, trend: [38,85,130,180,240,295,355,400,455,510,570,635,695,760,830,895,955,1020,1090,1170,1260,1350,1445,1590,1756] },
  { name: 'Sarah Jones', team: 'Jones United', points: 1721, trend: [50,110,165,210,255,305,350,410,460,515,575,630,690,745,805,870,935,1005,1075,1150,1230,1320,1420,1560,1721] },
  { name: 'Mike Brown', team: "Brown's Ballers", points: 1698, trend: [35,80,125,175,230,280,340,395,445,500,555,610,670,725,785,845,910,975,1045,1120,1200,1290,1390,1540,1698] },
];

var rankClasses = ['rank-1','rank-2','rank-3','',''];
var colors = ['#3b82f6','#10b981','#ef4444','#f59e0b','#8b5cf6'];

var tbody = document.getElementById('tbody');

managers.forEach(function(m, idx) {
  var tr = document.createElement('tr');

  // Rank
  var tdRank = document.createElement('td');
  var span = document.createElement('span');
  span.className = 'rank ' + (rankClasses[idx] || '');
  span.textContent = idx + 1;
  tdRank.appendChild(span);
  tr.appendChild(tdRank);

  // Name
  var tdName = document.createElement('td');
  tdName.textContent = m.name;
  tr.appendChild(tdName);

  // Team
  var tdTeam = document.createElement('td');
  tdTeam.textContent = m.team;
  tr.appendChild(tdTeam);

  // Sparkline
  var tdSpark = document.createElement('td');
  tdSpark.className = 'sparkline-cell';
  var canvas = document.createElement('canvas');
  canvas.width = 120;
  canvas.height = 32;
  tdSpark.appendChild(canvas);
  tr.appendChild(tdSpark);

  // Points
  var tdPts = document.createElement('td');
  tdPts.className = 'points';
  tdPts.textContent = m.points.toLocaleString();
  tr.appendChild(tdPts);

  tbody.appendChild(tr);

  // Draw sparkline
  var ctx = canvas.getContext('2d');
  var data = m.trend;
  var min = Math.min.apply(null, data);
  var max = Math.max.apply(null, data);
  var range = max - min || 1;
  var w = canvas.width;
  var h = canvas.height;
  var pad = 2;

  // Fill gradient
  ctx.beginPath();
  ctx.moveTo(pad, h - pad);
  for (var i = 0; i < data.length; i++) {
    var x = pad + (i / (data.length - 1)) * (w - 2 * pad);
    var y = h - pad - ((data[i] - min) / range) * (h - 2 * pad);
    ctx.lineTo(x, y);
  }
  ctx.lineTo(w - pad, h - pad);
  ctx.closePath();
  var grad = ctx.createLinearGradient(0, 0, 0, h);
  grad.addColorStop(0, colors[idx] + '30');
  grad.addColorStop(1, colors[idx] + '05');
  ctx.fillStyle = grad;
  ctx.fill();

  // Line
  ctx.beginPath();
  for (var i = 0; i < data.length; i++) {
    var x = pad + (i / (data.length - 1)) * (w - 2 * pad);
    var y = h - pad - ((data[i] - min) / range) * (h - 2 * pad);
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  }
  ctx.strokeStyle = colors[idx];
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // End dot
  var lastX = w - pad;
  var lastY = h - pad - ((data[data.length - 1] - min) / range) * (h - 2 * pad);
  ctx.beginPath();
  ctx.arc(lastX, lastY, 2.5, 0, Math.PI * 2);
  ctx.fillStyle = colors[idx];
  ctx.fill();
});
</script>
</body>
</html>
